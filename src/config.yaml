site:
  name: 4dvista.com
  site: 'https://4dvista.com' # Se sobreescribe en astro.config.ts para GitHub Pages
  base: '/' # Se sobreescribe en astro.config.ts para GitHub Pages
  trailingSlash: false

  # googleSiteVerificationId: '' # Agrega aquí tu ID de Google Search Console cuando lo tengas

# Default SEO metadata
metadata:
  title:
    default: 4dvista.com
    template: '%s — 4dvista.com'
  description: 'Convierte tus espacios en experiencias digitales inmersivas: tours virtuales 360°, Google Street View, modelado 3D, gemelos digitales y capturas 4D.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: 4dvista.com
    images:
      - url: '~/assets/images/image1_tour360.webp'
        width: 1200
        height: 628
    type: website
  twitter:
    cardType: summary_large_image

i18n:
  language: es
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
